# compose.yaml
# Defines the local Docker Compose stack for the API and its PostgreSQL dependency.
# Connects to: Dockerfile, .env.example, PostgreSQL
# Created: 2026-06-28

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: url-shortener-api
    depends_on:
      db:
        condition: service_healthy
    environment:
      APP_ENV: docker
      APP_HOST: 0.0.0.0
      APP_PORT: 8080
      DATABASE_URL: postgres://postgres:postgres@db:5432/url_shortener?sslmode=disable
      SHORT_CODE_LENGTH: 6
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--spider", "http://127.0.0.1:8080/healthz"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  db:
    image: postgres:17-alpine
    container_name: url-shortener-db
    environment:
      POSTGRES_DB: url_shortener
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d url_shortener"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    restart: unless-stopped

volumes:
  postgres_data:
